name: practice-hub-tools
services:
  postgres:
    image: postgres:latest
    container_name: practice-hub-postgres
    restart: always
    ports:
      - 5432:5432
    command: ['postgres']
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: practice-hub
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - practice-hub

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: practice-hub-keycloak
    restart: always
    ports:
      - 8080:8080
    command: start-dev
    volumes:
      - ./keycloak-data:/opt/keycloak/data
    environment:
      KEYCLOAK_USER: admin
      KEYCLOAK_PASSWORD: admin
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/practice-hub
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KC_DB_DRIVER: org.postgresql.Driver
      KC_DB_SCHEMA: keycloak
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HOSTNAME_STRICT_HTTPS: false
      KC_HEALTH_ENABLED: true
    depends_on:
      - postgres
    networks:
      - practice-hub

  redis:
    image: redis:latest
    container_name: practice-hub-redis
    restart: always
    ports:
      - 6379:6379
    command: ['redis-server', '--save', '60', '1', '--loglevel', 'warning']
    volumes:
      - ./redis-data:/data
    depends_on:
      - keycloak
    networks:
      - practice-hub

networks:
  practice-hub:
    driver: bridge
